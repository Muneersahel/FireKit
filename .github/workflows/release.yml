name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to release (e.g. v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-2025-vs2026]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'push' && github.ref || format('refs/tags/{0}', github.event.inputs.tag) }}

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build installers
        run: pnpm run build && pnpm run electron:build && pnpm exec electron-builder --publish never
        env:
          CI: true

      # Only ship installers — not win-unpacked / linux-unpacked (node_modules, etc.)
      - name: Collect installers
        shell: bash
        run: |
          mkdir -p upload
          find release -maxdepth 1 -type f \( \
            -iname '*.dmg' -o -iname '*.zip' -o -iname '*.AppImage' -o \
            -iname '*.deb' -o -iname '*.exe' -o -iname '*.msi' -o -iname '*.blockmap' \
            \) -exec cp {} upload/ \;
          ls -la upload/
          if [ -z "$(ls -A upload)" ]; then
            echo "No installer files in release/:" && ls -la release/ && exit 1
          fi

      - name: Upload platform artifacts
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.os }}
          path: upload/
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: installers-*
          path: artifacts
          merge-multiple: true

      - name: List release files
        run: find artifacts -type f | sort

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
          name: ${{ github.event_name == 'push' && github.ref_name || github.event.inputs.tag }}
          draft: false
          prerelease: false
          overwrite_files: true
          generate_release_notes: true
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.zip
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.blockmap
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
