name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

# Required for electron-builder to create/update GitHub Releases.
permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build and publish to GitHub Releases
        run: pnpm run dist:release
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CI: true
